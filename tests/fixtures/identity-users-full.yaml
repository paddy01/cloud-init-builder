#cloud-config
hostname: web01
fqdn: web01.lan.example.com
prefer_fqdn_over_hostname: true
manage_etc_hosts: localhost
timezone: Europe/Stockholm
locale: en_US.UTF-8
users:
  - default
  - name: deploy
    gecos: Deploy User
    primary_group: deploy
    groups:
      - docker
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    homedir: /srv/deploy
